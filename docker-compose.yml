services:
  backend:
    build: ./backend
    environment:
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:8080}
    volumes:
      - mcss-data:/home/mcss/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/system/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mcss-data:
