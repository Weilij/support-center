name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  workflow-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.x
      - name: Install actionlint
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Lint GitHub Actions workflows
        run: actionlint

  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="origin/${{ github.base_ref }}"
            head="HEAD"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi

          if [[ -z "$base" || "$base" =~ ^0+$ ]] || ! git rev-parse --verify "$base" >/dev/null 2>&1; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
            echo "frontend=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed="$(git diff --name-only "$base" "$head")"
          if grep -Eq '^(backend/|Cargo\.(toml|lock)|\.github/workflows/ci\.yml)' <<< "$changed"; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend=false" >> "$GITHUB_OUTPUT"
          fi

          if grep -Eq '^(frontend/|\.github/workflows/ci\.yml)' <<< "$changed"; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend=false" >> "$GITHUB_OUTPUT"
          fi

  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      CARGO_PROFILE_DEV_DEBUG: 0
      CARGO_PROFILE_TEST_DEBUG: 0
      TEST_DATABASE_ADMIN_URL: postgres://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend -> target
          cache-bin: false
          cache-on-failure: false
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Test
        run: cargo test
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Build installer
        run: cargo build --bin installer

  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Unit tests
        run: npm test
      - name: Type-check + build
        run: npm run build
